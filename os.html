<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retrowave OS</title>
  <link rel="stylesheet" href="/src/os/os.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- Boot screen overlay -->
  <div id="boot-screen">
    <div class="boot-center">
      <div class="boot-logo">
        <span class="boot-logo-r">R</span>
        <span class="boot-logo-text">ETROWAVE OS</span>
      </div>
      <div class="boot-subtitle">v0.1 — Mobile Edition</div>
      <div class="boot-bar-outer">
        <div class="boot-bar-inner" id="boot-bar"></div>
      </div>
      <div class="boot-status" id="boot-status">Inicializando sistema...</div>
    </div>
  </div>
  <script type="module" src="/src/os-main.ts"></script>
</body>
</html>
